services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: elasticsearch-dev
    environment:
      - node.name=es-dev-1
      - cluster.name=${ELASTIC_CLUSTER_NAME:-many-faces-dev}
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms${ELASTIC_HEAP_MB:-512}m -Xmx${ELASTIC_HEAP_MB:-512}m"
    ports:
      - "${ELASTIC_HTTP_HOST_PORT:-59200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - elastic-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:9200 >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  elasticsearch-data:

networks:
  elastic-network:
    driver: bridge
